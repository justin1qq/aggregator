name: Auto Update Proxies

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

# 添加全局环境变量，消除 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 执行聚合爬虫脚本 (含路径调试)
        run: |
          # 打印当前目录结构，方便在日志中排查配置文件是否存在
          echo "=== 当前目录文件列表 ==="
          ls -la
          echo "=== config 目录文件列表 ==="
          ls -la subscribe/config/ || echo "config 目录不存在"
          
          # 执行脚本（如果你指定了特定配置文件，请修改下方命令，如 python process.py -c my_config.json）
          python process.py
        env:
          TZ: Asia/Shanghai

      - name: 5. 将更新后的节点文件提交回仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update proxies [skip ci]"
          branch: main
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
