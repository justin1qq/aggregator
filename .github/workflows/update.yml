name: Auto Update Proxies

on:
  schedule:
    # 定时任务：每天 UTC 时间 0点和12点运行（对应北京时间早上8点和晚上8点）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许在网页上随时点击按钮手动运行

# 消除 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-proxies:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 环境

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. 安装依赖包 (在根目录执行)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 执行聚合爬虫脚本 (进入子目录并强制指定配置文件)
        run: |
          # 进入包含 process.py 的目录
          cd subscribe
          
          # 强制指定读取 config.default.json，无视其他可能导致报错的隐藏文件
          python process.py -c config/config.default.json
        env:
          TZ: Asia/Shanghai

      - name: 5. 将更新后的节点文件提交回仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update proxies [skip ci]"
          branch: main # 请确保这里与您仓库的主分支名称一致（通常是 main 或 master）
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
