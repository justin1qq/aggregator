name: Auto Update Proxies

# 触发条件配置
on:
  schedule:
    # 定时任务：这里设置的是每天 UTC 时间 0点和12点运行（对应北京时间早上8点和晚上8点）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许你在网页上随时点击按钮手动运行

jobs:
  update-proxies:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 环境

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 推荐使用 3.10
          cache: 'pip' # 开启缓存加速后续运行

      - name: 3. 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 执行聚合爬虫脚本
        run: |
          # 如果你的配置文件使用了其他名字或路径，请相应修改此处的命令，比如添加 -c 参数
          python process.py
        env:
          TZ: Asia/Shanghai # 设置时区，避免日志时间错乱

      - name: 5. 将更新后的节点文件提交回仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update proxies [skip ci]"
          branch: main # 请确保这里与你仓库的主分支名称一致（通常是 main 或 master）
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
